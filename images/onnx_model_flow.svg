<svg width="1600" height="760" viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ONNX model registration flow in Oracle Database</title>
  <desc id="desc">Diagram showing an ONNX model file copied to an Oracle directory, loaded with LOAD_ONNX_MODEL, registered in Oracle, and invoked from SQL.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334338"/>
    </marker>
    <linearGradient id="dbGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#405244"/>
      <stop offset="55%" stop-color="#3d4f43"/>
      <stop offset="100%" stop-color="#24352b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="760" fill="#ffffff"/>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <rect x="88" y="92" width="350" height="116" rx="26" fill="#334338" filter="url(#shadow)"/>
    <text x="263" y="136" font-size="34" font-weight="700" fill="#ffffff">ONNX</text>
    <text x="263" y="178" font-size="34" font-weight="700" fill="#ffffff">model file</text>

    <rect x="650" y="92" width="350" height="116" rx="26" fill="#334338" filter="url(#shadow)"/>
    <text x="825" y="132" font-size="34" font-weight="700" fill="#ffffff">Oracle directory</text>
    <text x="825" y="176" font-size="34" font-weight="700" fill="#ffffff">(ONNX_DIR)</text>

    <rect x="1216" y="92" width="350" height="116" rx="26" fill="#334338" filter="url(#shadow)"/>
    <text x="1391" y="132" font-size="34" font-weight="700" fill="#ffffff">LOAD_ONNX_</text>
    <text x="1391" y="176" font-size="34" font-weight="700" fill="#ffffff">MODEL()</text>

    <path d="M438 150 H640" stroke="#334338" stroke-width="10" marker-end="url(#arrow)" fill="none"/>
    <path d="M1000 150 H1206" stroke="#334338" stroke-width="10" marker-end="url(#arrow)" fill="none"/>

    <text x="457" y="405" text-anchor="start" font-size="37" font-weight="700" fill="#373737">Model registered</text>
    <text x="520" y="452" text-anchor="start" font-size="37" font-weight="700" fill="#373737">in Oracle</text>

    <g filter="url(#shadow)">
      <ellipse cx="826" cy="380" rx="116" ry="40" fill="#4a5c50"/>
      <path d="M710 380 V548 C710 570 762 594 826 594 C890 594 942 570 942 548 V380 Z" fill="url(#dbGrad)"/>
      <ellipse cx="826" cy="380" rx="116" ry="40" fill="none" stroke="#c5ccc7" stroke-width="5"/>
      <path d="M710 470 C754 438 796 500 826 430 C860 510 898 438 942 470" fill="none" stroke="#ff745e" stroke-width="7"/>
      <circle cx="766" cy="458" r="15" fill="#ff745e"/>
      <circle cx="824" cy="383" r="15" fill="#ff745e"/>
      <circle cx="893" cy="431" r="15" fill="#ff745e"/>
      <path d="M824 430 L848 476 L894 500 L848 524 L824 570 L800 524 L754 500 L800 476 Z" fill="#ffffff"/>
    </g>

    <path d="M1408 208 C1404 330 1328 420 1180 456 C1092 478 1008 476 952 468" stroke="#343434" stroke-width="7" marker-end="url(#arrow)" fill="none"/>
    <path d="M826 594 V694" stroke="#334338" stroke-width="9" marker-end="url(#arrow)" fill="none"/>

    <rect x="649" y="662" width="354" height="92" rx="15" fill="#334338" filter="url(#shadow)"/>
    <text x="826" y="720" font-size="36" font-weight="700" fill="#ffffff">Invoke from SQL</text>
  </g>
</svg>
